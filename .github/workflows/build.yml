name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build App
        run: npm run build

  package-mac:
    name: Package macOS App
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Package macOS App
        run: npm run dist:mac

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mac-mini-tools-macos-arm64-${{ github.sha }}
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 14
